name: Build Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "50 6 * * *" # Daily at 06:50 UTC (2 hours after GitLab cycle)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@dc32c2d2d02c3d14691202ec57cae9e0394548ed # v3.7.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c5346752766336e768787f735626889700b080 # v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e600775e527acba2317260cadb64b7e19efd5362 # v3.9.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f089100787d55f0b54020a108a76383e20 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e403d16853240e941160a0f6534579d47915 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@10e90e32626e8346e45c4794e77519998188151d # v6.12.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}"

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@f3242a445b204e33b8656f592652f14309a6db6c # v0.19.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: "spdx-json"
          output-file: "sbom.spdx.json"

      - name: Create Attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@10926c72720ffc3f7b666661c8e55b1344e2a365 # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          sbom-path: "sbom.spdx.json"
          push-to-registry: true
