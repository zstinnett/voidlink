build:
  stage: build
  image: docker:24.0.5@sha256:3c6e4dca7a63c9a32a4e00da40461ce067f255987ccc9721cf18ffa087bcd1ef
  services:
    - docker:24.0.5-dind@sha256:3c6e4dca7a63c9a32a4e00da40461ce067f255987ccc9721cf18ffa087bcd1ef
  # Exclude GitHub release secrets — build only needs GitLab registry access.
  inherit:
    variables: false
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  script:
    - apk add --no-cache git
    # Replace placeholders for GitLab release
    - sed -i "s|[\$\$][\$\$]REPO_URL[\$\$][\$\$]|$CI_PROJECT_URL|g" Dockerfile README.md
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --driver-opt network=host
    - docker buildx build --platform linux/amd64,linux/arm64 --provenance=false -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --push .
