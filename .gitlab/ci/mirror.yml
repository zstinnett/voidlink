mirror_to_github:
  stage: release
  image:
    name: cgr.dev/chainguard/git:latest
    entrypoint: [""]
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "voidlink-github-release"
  # Mirror only needs GitHub credentials and OpenBao. No Docker registry access required.
  inherit:
    variables: false
  variables:
    GITHUB_REPO: "$GITHUB_REPO"
    GITHUB_USER: "$GITHUB_USER"
    OPENBAO_ADDR: "$OPENBAO_ADDR"
    GITHUB_INSTALLATION_ID: "$GITHUB_INSTALLATION_ID"
  script:
    - apk add --no-cache curl jq
    - |
      if [ -z "$GITHUB_REPO" ] || [ -z "$GITHUB_USER" ] || [ -z "$OPENBAO_ADDR" ]; then
        echo "GitHub logic (GITHUB_REPO, GITHUB_USER, OPENBAO_ADDR) not set. Skipping mirror."
        exit 0
      fi
      
      echo "Authenticating via OpenBao JWT..."
      BAO_TOKEN=$(curl -s --request POST --data '{"jwt":"'"$VAULT_ID_TOKEN"'","role":"voidlink-ci"}' $OPENBAO_ADDR/v1/auth/jwt/login | jq -r .auth.client_token)
      echo "Fetching dynamic GitHub token..."
      curl -s --request POST --header "X-Vault-Token: $BAO_TOKEN" --data '{"installation_id":"'"$GITHUB_INSTALLATION_ID"'"}' $OPENBAO_ADDR/v1/github/token | jq -r .data.token | tr -d '\n' > /dev/shm/ghtoken.txt
      
      # Use the ephemeral token for the remote, then quickly revoke it from GitHub
      git remote add github https://$GITHUB_USER:$(cat /dev/shm/ghtoken.txt)@$GITHUB_REPO
      git fetch --unshallow origin || git fetch origin # Ensure we have history
      
      echo "Revoking token at GitHub..."
      curl -s -X DELETE -H "Authorization: Bearer $(cat /dev/shm/ghtoken.txt)" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/installation/token || true
      rm -f /dev/shm/ghtoken.txt

      IMAGE_NAME=$(echo "ghcr.io/$GITHUB_USER/voidlink" | tr '[:upper:]' '[:lower:]')
      REPO_URL="https://github.com/$GITHUB_USER/voidlink"
      # Use character classes to safely match $$ without shell/regex escaping hell
      sed -i "s|[\$\$][\$\$]IMAGE_NAME[\$\$][\$\$]|$IMAGE_NAME:latest|g" README.md
      sed -i "s|[\$\$][\$\$]REPO_URL[\$\$][\$\$]|$REPO_URL|g" Dockerfile README.md

      git config user.name "GitLab CI"
      git config user.email "ci@$CI_SERVER_HOST"
      git add README.md Dockerfile .github/workflows/
      git commit -m "docs: bake image name and repo URLs for release" || echo "No changes to mirror files"
      git push --force github HEAD:refs/heads/$CI_COMMIT_REF_NAME
  allow_failure: true
