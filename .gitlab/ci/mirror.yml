mirror_to_github:
  stage: release
  needs:
    - job: gh_release
      optional: true
  # alpine:3.19 provides sh, git, grep, mkdir, sed, tr, awk — all required by the
  # GitLab CI runner wrapper AND our script. cgr.dev/chainguard/git is distroless
  # and lacks even mkdir, causing exit 127 before user code runs.
  image: cgr.dev/chainguard/wolfi-base:latest
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "voidlink-github-release"
  # Pass only the required project variables using the list form.
  inherit:
    variables:
      - GITHUB_REPO
      - GITHUB_USER
      - OPENBAO_ADDR
  variables:
    GIT_DEPTH: "0"
  script:
    - apk add --no-cache git curl jq
    - |
      if [ -z "$GITHUB_REPO" ] || [ -z "$GITHUB_USER" ] || [ -z "$OPENBAO_ADDR" ]; then
        echo "GitHub vars (GITHUB_REPO, GITHUB_USER, OPENBAO_ADDR) not set. Skipping mirror."
        exit 0
      fi

      echo "Authenticating via OpenBao JWT..."
      BAO_RESPONSE=$(curl -sS --request POST \
        --data "{\"jwt\":\"$VAULT_ID_TOKEN\",\"role\":\"voidlink-ci\"}" \
        "$OPENBAO_ADDR/v1/auth/jwt/login")
      BAO_TOKEN=$(echo "$BAO_RESPONSE" | jq -r .auth.client_token)
      if [ -z "$BAO_TOKEN" ] || [ "$BAO_TOKEN" = "null" ]; then
        echo "ERROR: OpenBao JWT login failed. Response: $BAO_RESPONSE"
        exit 1
      fi

      echo "Fetching dynamic GitHub token..."
      GH_RESPONSE=$(curl -sS --request POST \
        --header "X-Vault-Token: $BAO_TOKEN" \
        "$OPENBAO_ADDR/v1/github/token/voidlink-release")
      GH_TOKEN=$(echo "$GH_RESPONSE" | jq -r '.data.token' | tr -d '\n')
      if [ -z "$GH_TOKEN" ] || [ "$GH_TOKEN" = "null" ]; then
        echo "ERROR: Failed to obtain GitHub installation token. Response: $GH_RESPONSE"
        exit 1
      fi

      IMAGE_NAME=$(echo "ghcr.io/$GITHUB_USER/voidlink" | tr '[:upper:]' '[:lower:]')
      REPO_URL="https://github.com/$GITHUB_USER/voidlink"
      # [$][$] matches a literal $$ in sed without shell expansion conflicts
      sed -i "s|[\\$][\\$]IMAGE_NAME[\\$][\\$]|${IMAGE_NAME}:latest|g" README.md
      sed -i "s|[\\$][\\$]REPO_URL[\\$][\\$]|${REPO_URL}|g" Dockerfile README.md

      git config user.name "GitLab CI"
      git config user.email "ci@$CI_SERVER_HOST"

      # Embed token in remote URL for push auth, then revoke AFTER push
      git remote add github "https://$GITHUB_USER:${GH_TOKEN}@$GITHUB_REPO"

      git add README.md Dockerfile .github/workflows/
      # Only commit if there are staged changes; avoids a fatal "nothing to commit" exit
      git diff --cached --quiet || git commit -m "docs: bake image name and repo URLs for release"
      git push --force github HEAD:refs/heads/$CI_COMMIT_REF_NAME

      echo "Revoking token at GitHub..."
      curl -sS -X DELETE \
        -H "Authorization: Bearer $GH_TOKEN" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        https://api.github.com/installation/token
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
