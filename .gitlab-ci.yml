stages:
  - secrets
  - pre-build
  - build
  - test
  - security
  - release
  - renovate

include:
  - local: "/.gitlab/ci/build.yml"
  - local: "/.gitlab/ci/test.yml"
  - local: "/.gitlab/ci/security.yml"
  - local: "/.gitlab/ci/release.yml"
  - local: "/.gitlab/ci/mirror.yml"
  - local: "/.gitlab/ci/renovate.yml"
  - template: Security/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

variables:
  GITLAB_ADVANCED_SAST_ENABLED: "true"

# 1. Run Secrets check FIRST (Fail cheapest/fastest)
secret_detection:
  stage: secrets
  allow_failure: false
  before_script:
    - |
      if [ -n "$INTERNAL_DOMAIN_REGEXP" ]; then
        echo "Injecting internal domain patterns into secret detection rules..."
        # 1. Double the backslashes for TOML triple-double-quoted strings
        # 2. Use a literal awk replacement to avoid & and \n issues
        export REGEXP_FOR_TOML=$(printf '%s' "$INTERNAL_DOMAIN_REGEXP" | sed 's/\\/\\\\/g')
        awk '
          BEGIN {
            s = "INTERNAL_DOMAIN_REGEXP_PLACEHOLDER"
            r = ENVIRON["REGEXP_FOR_TOML"]
          }
          {
            while (i = index($0, s)) {
              $0 = substr($0, 1, i-1) r substr($0, i+length(s))
            }
            print
          }
        ' .gitlab/secret-detection-ruleset.toml > .gitlab/ruleset.toml.tmp
        mv .gitlab/ruleset.toml.tmp .gitlab/secret-detection-ruleset.toml
      fi

# 2. Gatekeeper: Fail if ANY secrets were discovered
enforce_secrets_gate:
  stage: pre-build # Execute before Build to prevent leaking secrets into images
  image: cgr.dev/chainguard/wolfi-base:latest
  dependencies:
    - secret_detection
  script:
    - |
      if [ -f gl-secret-detection-report.json ]; then
        apk add --no-cache jq
        COUNT=$(jq '.vulnerabilities | length' gl-secret-detection-report.json)
        if [ "$COUNT" -ne 0 ]; then
          echo "FATAL: $COUNT secret(s) detected in the repository!"
          echo "Pipeline halted to prevent supply chain contamination."
          exit 1
        fi
        echo "No secrets found. Proceeding..."
      else
        echo "Warning: Secret detection report not found. Skipping gate check."
      fi

# 2. Run Static Analysis & Dependency checks
sast:
  stage: pre-build

trivy_fs_scan:
  stage: pre-build
  image:
    name: aquasec/trivy:0.49.1@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
    entrypoint: [""]
  # Deny all inherited custom CI/CD variables — this job scans local source
  # only and needs zero credentials. GitLab predefined vars (CI_*) are still
  # available but our custom secrets (GITHUB_TOKEN, registry creds, etc.) are not.
  inherit:
    variables: false
  variables:
    TRIVY_NO_PROGRESS: "true"
  script:
    - trivy fs . --exit-code 1 --severity CRITICAL,HIGH --scanners vuln,misconfig
